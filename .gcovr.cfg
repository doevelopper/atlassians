# gcovr configuration for coverage reporting
# This ensures consistent exclusions across all gcovr runs

# Exclude patterns (regex)
exclude-pattern:
  - '.*/src/test/.*'
  - '.*/src/it/.*'
  - '.*/test/.*'
  - '.*/tests/.*'
  - '.*/vendor/.*'
  - '.*/target/.*'
  - '.*/build/.*'
  - '.*/gtest/.*'
  - '.*/googletest/.*'
  - '.*/include/gtest/.*'
  - '.*gtest.*'
  - '/usr/.*'
  - '.*_test\.cpp'
  - '.*_test\.c'
  - '.*Test\.cpp'
  - '.*Test\.c'

# Filter to include only production code
filter:
  - 'src/main/cpp'

# Output options
print-summary: true
sort-percentage: true

# Report options
html-details: true
xml-pretty: true