# Grafana dashboard provisioning configuration.
#
# Place this file at /etc/grafana/provisioning/dashboards/ inside
# your Grafana container or installation.

apiVersion: 1

providers:
  - name: "project-dashboards"
    orgId: 1
    folder: "Project"
    folderUid: "project"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
