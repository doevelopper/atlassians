# Prometheus alerting rules — project-level baseline.
#
# Deploy alongside your Prometheus instance.
# Adjust severity labels and thresholds per operational runbook.

groups:
  - name: service.availability
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: >
            The target {{ $labels.instance }} has been unreachable
            for more than 2 minutes.
          runbook_url: "https://example.com/runbooks/service-down"

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
            / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate on {{ $labels.job }}"
          description: >
            Error rate is {{ humanizePercentage $value }} over the last 5 minutes.

  - name: service.latency
    rules:
      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency exceeds 1 s on {{ $labels.job }}"
          description: >
            The 99th-percentile request latency is
            {{ humanizeDuration $value }}.

  - name: resource.saturation
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85 % on {{ $labels.instance }}"

      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
            / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Less than 10 % disk space available on {{ $labels.instance }}"
