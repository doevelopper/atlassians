# =============================================================================
# Release Stage — tag-triggered release with checksums and evidence
# =============================================================================

release:checksums:
  stage: release
  needs: ["build:packages"]
  script:
    - |
      cd release-artifacts
      sha256sum *.tar.gz > SHA256SUMS.txt 2>/dev/null || true
  artifacts:
    paths:
      - release-artifacts/SHA256SUMS.txt
    expire_in: 365 days
  rules:
    - if: '$PIPELINE_TYPE == "release"'
    - when: never

release:evidence:
  stage: release
  needs:
    - job: "test:unit"
      artifacts: true
    - job: "test:bdd"
      artifacts: true
    - job: "coverage:report"
      artifacts: true
      optional: true
  script:
    - |
      echo "=== Bundling QMS Evidence ==="

      cat > evidence/test-evidence-summary.md << SUMEOF
      # Release Test Evidence Summary

      | Field | Value |
      |-------|-------|
      | **Date** | $(date -u '+%Y-%m-%d') |
      | **Tag** | ${CI_COMMIT_TAG:-N/A} |
      | **Commit** | ${CI_COMMIT_SHA} |
      | **Pipeline** | ${CI_PIPELINE_URL} |

      ## Unit Test Results

      | Test Suite | Status |
      |------------|--------|
      SUMEOF

      for xml in evidence/unit-tests/*/test.xml; do
        [ -f "$xml" ] || continue
        suite=$(basename "$(dirname "$xml")")
        tests=$(grep -oP 'tests="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
        failures=$(grep -oP 'failures="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
        if [ "$failures" = "0" ]; then
          echo "| $suite | PASSED ($tests tests) |" >> evidence/test-evidence-summary.md
        else
          echo "| $suite | FAILED ($failures/$tests) |" >> evidence/test-evidence-summary.md
        fi
      done

      cat >> evidence/test-evidence-summary.md << 'SUMEOF'

      ## BDD/Integration Test Results

      | Feature Test | Status |
      |--------------|--------|
      SUMEOF

      for xml in evidence/bdd-tests/*/test.xml; do
        [ -f "$xml" ] || continue
        suite=$(basename "$(dirname "$xml")")
        tests=$(grep -oP 'tests="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
        failures=$(grep -oP 'failures="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
        if [ "$failures" = "0" ]; then
          echo "| $suite | PASSED ($tests tests) |" >> evidence/test-evidence-summary.md
        else
          echo "| $suite | FAILED ($failures/$tests) |" >> evidence/test-evidence-summary.md
        fi
      done

      echo "" >> evidence/test-evidence-summary.md
      echo "---" >> evidence/test-evidence-summary.md
      echo "_Generated by GitLab CI — $(date -u '+%Y-%m-%dT%H:%M:%SZ')_" >> evidence/test-evidence-summary.md

      tar czf release-evidence.tar.gz -C evidence . 2>/dev/null || true
  artifacts:
    paths:
      - evidence/
      - release-evidence.tar.gz
    expire_in: 365 days
  rules:
    - if: '$PIPELINE_TYPE == "release"'
    - if: '$PIPELINE_TYPE == "post_merge"'
    - when: never

release:publish:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  needs:
    - job: "release:checksums"
      artifacts: true
    - job: "release:evidence"
      artifacts: true
    - job: "sbom:generate"
      artifacts: true
      optional: true
    - job: "build:packages"
      artifacts: true
  script:
    - |
      echo "Publishing release ${CI_COMMIT_TAG}"

      # Generate changelog
      prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
      if [[ -n "$prev_tag" ]]; then
        changelog=$(git log --pretty=format:"- %s (%h)" "$prev_tag"..HEAD 2>/dev/null || echo "- Initial release")
      else
        changelog="- Initial release"
      fi

      echo "## Release ${CI_COMMIT_TAG}" > release-notes.md
      echo "" >> release-notes.md
      echo "### Changes" >> release-notes.md
      echo "$changelog" >> release-notes.md
      echo "" >> release-notes.md
      echo "### Quality Assurance" >> release-notes.md
      echo "All pipeline gates passed. See evidence bundle for details." >> release-notes.md
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: './release-notes.md'
    assets:
      links:
        - name: 'Release Packages'
          url: '${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/download'
          link_type: 'package'
  rules:
    - if: '$PIPELINE_TYPE == "release"'
    - when: never
