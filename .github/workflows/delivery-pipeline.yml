# =============================================================================
# Delivery Pipeline — End-to-End CI/CD
# =============================================================================
# Pipeline B (Branch Push):  fast preflight               (<10 min)
# Pipeline C (Pull Request): comprehensive quality gate   (15-30 min)
# Pipeline E (Post-Merge):   deep scans + evidence + SBOM (30-60 min)
#
# Branching model (Gitflow):
#   main     — production-ready; releases are tagged here only
#   develop  — integration branch; all feature/bugfix branches merge here
#   feature/** bugfix/** — short-lived work branches from develop
#   release/** hotfix/** — pre-release stabilisation / emergency fixes
#
# Flow: feature → develop (PR) → release → main (merge) → tag → release pipeline
#
# Aligned with:
#   - Simplified GitFlow (main/develop/feature/bugfix/release/hotfix)
#   - Security & quality as automated pipeline gates (not branches)
#   - CODEOWNERS enforcement, conventional commits, coverage thresholds
# =============================================================================

name: Delivery Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - bugfix/**
      - release/**
      - hotfix/**
      - support/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: 'Force full pipeline (all jobs)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read
  checks: write

concurrency:
  group: delivery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EVIDENCE_DIR: src/site/compliance/evidence
  COVERAGE_THRESHOLD: 80

jobs:
  # ===========================================================================
  # Stage 0: Context — classify trigger, detect changes, metadata
  # ===========================================================================
  context:
    name: "Context"
    runs-on: ubuntu-latest
    outputs:
      pipeline_type: ${{ steps.classify.outputs.pipeline_type }}
      branch_type: ${{ steps.classify.outputs.branch_type }}
      is_pr: ${{ steps.classify.outputs.is_pr }}
      is_main: ${{ steps.classify.outputs.is_main }}
      is_protected: ${{ steps.classify.outputs.is_protected }}
      has_cc_changes: ${{ steps.changes.outputs.has_cc_changes }}
      has_build_changes: ${{ steps.changes.outputs.has_build_changes }}
      changed_cc_files: ${{ steps.changes.outputs.changed_cc_files }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify pipeline
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          is_pr="false"
          is_main="false"
          is_protected="false"
          force_full="${{ github.event.inputs.run_full_pipeline || 'false' }}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            is_pr="true"
            ref="${{ github.base_ref }}"
          else
            ref="${GITHUB_REF_NAME}"
          fi

          case "$ref" in
            main|master)   branch_type="main";    is_main="true"; is_protected="true" ;;
            develop)       branch_type="develop";  is_protected="true" ;;
            release/*)     branch_type="release";  is_protected="true" ;;
            hotfix/*)      branch_type="hotfix";   is_protected="true" ;;
            feature/*)     branch_type="feature" ;;
            bugfix/*)      branch_type="bugfix" ;;
            support/*)     branch_type="support" ;;
            *)             branch_type="other" ;;
          esac

          if [[ "$force_full" == "true" ]]; then
            pipeline_type="full"
          elif [[ "$is_pr" == "true" ]]; then
            pipeline_type="pr_gate"
          elif [[ "$is_main" == "true" || "$branch_type" == "develop" ]]; then
            pipeline_type="post_merge"
          elif [[ "$branch_type" == "release" || "$branch_type" == "hotfix" ]]; then
            pipeline_type="post_merge"
          else
            pipeline_type="branch_push"
          fi

          echo "pipeline_type=$pipeline_type"   >> "$GITHUB_OUTPUT"
          echo "branch_type=$branch_type"       >> "$GITHUB_OUTPUT"
          echo "is_pr=$is_pr"                   >> "$GITHUB_OUTPUT"
          echo "is_main=$is_main"               >> "$GITHUB_OUTPUT"
          echo "is_protected=$is_protected"     >> "$GITHUB_OUTPUT"

          echo "### Pipeline Context" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pipeline | **$pipeline_type** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch type | $branch_type |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Is PR | $is_pr |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | $ref |" >> "$GITHUB_STEP_SUMMARY"

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            diff_files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          else
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              diff_files=$(git diff --name-only HEAD~1...HEAD 2>/dev/null || git ls-files)
            else
              diff_files=$(git diff --name-only "${{ github.event.before }}"..."${{ github.sha }}")
            fi
          fi

          cc_files=$(printf '%s\n' "$diff_files" | grep -E '\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$' || true)
          build_files=$(printf '%s\n' "$diff_files" | grep -E '(BUILD|BUILD\.bazel|MODULE\.bazel|\.bazelrc|\.bzl)' || true)

          has_cc="false"
          has_build="false"
          [[ -n "$cc_files" ]] && has_cc="true"
          [[ -n "$build_files" ]] && has_build="true"

          echo "has_cc_changes=$has_cc"         >> "$GITHUB_OUTPUT"
          echo "has_build_changes=$has_build"   >> "$GITHUB_OUTPUT"

          cc_inline=$(printf '%s' "$cc_files" | tr '\n' ' ')
          echo "changed_cc_files=$cc_inline"    >> "$GITHUB_OUTPUT"

      - name: Build metadata
        id: meta
        shell: bash
        run: |
          echo "short_sha=$(git rev-parse --short=7 HEAD)"  >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u '+%Y-%m-%d')"          >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Stage 0b: PR Governance — conventional commits, title, linked issues
  # ===========================================================================
  pr_governance:
    name: "PR Governance"
    runs-on: ubuntu-latest
    needs: context
    if: needs.context.outputs.is_pr == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate conventional commit PR title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow Conventional Commits format."
            echo "Expected: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Got: $PR_TITLE"
            exit 1
          fi
          echo "PR title is valid: $PR_TITLE"

      - name: Check PR size (advisory)
        shell: bash
        run: |
          additions=${{ github.event.pull_request.additions || 0 }}
          deletions=${{ github.event.pull_request.deletions || 0 }}
          total=$((additions + deletions))
          if [[ $total -gt 1000 ]]; then
            echo "::warning::Large PR detected ($total lines changed). Consider splitting into smaller PRs."
          fi
          echo "PR size: +$additions -$deletions ($total total)" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify signed commits (advisory)
        shell: bash
        continue-on-error: true
        run: |
          unsigned=$(git log --format='%H %GG' origin/${{ github.base_ref }}..HEAD | grep -v 'Good signature' | head -5)
          if [[ -n "$unsigned" ]]; then
            echo "::warning::Some commits are not GPG signed. Signed commits are recommended for protected branches."
          fi

  # ===========================================================================
  # Stage 1: Quality — format, lint, static analysis
  # ===========================================================================
  quality:
    name: "Quality"
    runs-on: ubuntu-latest
    needs: context
    if: needs.context.outputs.has_cc_changes == 'true' || needs.context.outputs.has_build_changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-quality
          repository-cache: true

      - name: Install C/C++ quality tools
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format clang-tidy cppcheck iwyu python3-pip
          python3 -m pip install --quiet cpplint

      - name: Lint changed files (branch push — diff only)
        if: needs.context.outputs.pipeline_type == 'branch_push'
        shell: bash
        run: |
          files="${{ needs.context.outputs.changed_cc_files }}"
          if [[ -z "$files" ]]; then echo "No changed C/C++ files"; exit 0; fi
          echo "::group::clang-format"
          clang-format --dry-run --Werror $files
          echo "::endgroup::"
          echo "::group::cpplint"
          cpplint --quiet --filter=-legal/copyright,-build/include_subdir $files || true
          echo "::endgroup::"
          echo "::group::cppcheck (diff only)"
          cppcheck --error-exitcode=1 --enable=warning,style,performance,portability \
            --std=c++20 --suppress=missingIncludeSystem $files
          echo "::endgroup::"

      - name: Lint all sources (PR / post-merge / full)
        if: needs.context.outputs.pipeline_type != 'branch_push'
        shell: bash
        run: |
          files=$(git ls-files -- '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx')
          if [[ -z "$files" ]]; then echo "No C/C++ files found"; exit 0; fi
          echo "::group::clang-format"
          clang-format --dry-run --Werror $files
          echo "::endgroup::"
          echo "::group::cpplint"
          cpplint --quiet --filter=-legal/copyright,-build/include_subdir $files || true
          echo "::endgroup::"
          echo "::group::cppcheck (full)"
          cppcheck --error-exitcode=1 --enable=warning,style,performance,portability \
            --std=c++20 --suppress=missingIncludeSystem $files
          echo "::endgroup::"

      - name: clang-tidy (PR / post-merge / full)
        if: needs.context.outputs.pipeline_type != 'branch_push'
        shell: bash
        continue-on-error: true
        run: |
          files=$(git ls-files -- '*.cpp' '*.cc' '*.cxx' '*.c')
          if [[ -z "$files" ]]; then echo "No C/C++ source files"; exit 0; fi
          echo "::group::clang-tidy"
          clang-tidy $files 2>&1 | tee clang-tidy-report.txt | head -200
          echo "::endgroup::"

      - name: include-what-you-use (advisory, non-blocking)
        if: needs.context.outputs.pipeline_type != 'branch_push'
        shell: bash
        continue-on-error: true
        run: |
          main_files=$(git ls-files -- 'src/main/cpp/**/*.cpp' 'src/main/cpp/**/*.cc')
          if [[ -z "$main_files" ]]; then echo "No main sources for iwyu"; exit 0; fi
          echo "::group::include-what-you-use"
          for f in $main_files; do
            include-what-you-use -std=c++20 -I src/main/cpp "$f" 2>&1 || true
          done | tee iwyu-report.txt | head -100
          echo "::endgroup::"

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-${{ needs.context.outputs.short_sha }}
          path: |
            clang-tidy-report.txt
            iwyu-report.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Buildifier check (Starlark)
        shell: bash
        continue-on-error: true
        run: |
          if command -v buildifier >/dev/null 2>&1; then
            find . -name "BUILD" -o -name "BUILD.bazel" -o -name "*.bzl" | \
              xargs buildifier --lint=warn --mode=check
          fi

  # ===========================================================================
  # Stage 2: Build — compile all sources + tiered artifact packaging
  # ===========================================================================
  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: context
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build
          repository-cache: true

      - name: Build all sources
        shell: bash
        run: |
          mkdir -p evidence/build
          bazelisk build \
            --profile=evidence/build/bazel-build-profile.json.gz \
            //src/main/cpp/... //src/test/cpp/... //src/it/...

      - name: Build packages
        shell: bash
        run: |
          bazelisk build \
            //src/main/cpp:com.github.doevelopper.atlassians.main.package \
            //src/test/cpp:com.github.doevelopper.atlassians.test.package \
            //src/it:com.github.doevelopper.atlassians.it.package

      # === Source Package (all branches) ===
      - name: Create source package
        shell: bash
        run: |
          mkdir -p release-staging
          version="${{ needs.context.outputs.short_sha }}"
          git archive --format=tar.gz --prefix="atlassians-${version}/" \
            -o "release-staging/atlassians-${version}-source.tar.gz" HEAD

      - name: Upload source package
        uses: actions/upload-artifact@v7
        with:
          name: source-package-${{ needs.context.outputs.short_sha }}
          path: release-staging/*-source.tar.gz
          retention-days: 30

      # === Production Binaries Package (develop, release, main, or full) ===
      - name: Stage production binaries
        if: >-
          needs.context.outputs.pipeline_type == 'post_merge' ||
          needs.context.outputs.pipeline_type == 'pr_gate' ||
          needs.context.outputs.pipeline_type == 'full'
        shell: bash
        run: |
          mkdir -p release-staging
          version="${{ needs.context.outputs.short_sha }}"
          cp bazel-bin/src/main/cpp/*.tar.gz \
            "release-staging/atlassians-${version}-binaries.tar.gz" 2>/dev/null || true

      - name: Upload production binaries package
        if: >-
          needs.context.outputs.pipeline_type == 'post_merge' ||
          needs.context.outputs.pipeline_type == 'pr_gate' ||
          needs.context.outputs.pipeline_type == 'full'
        uses: actions/upload-artifact@v7
        with:
          name: binaries-package-${{ needs.context.outputs.short_sha }}
          path: release-staging/*-binaries.tar.gz
          retention-days: 30

      # === Quality & Assessment Package (all branches — varies in content) ===
      - name: Stage quality package components
        shell: bash
        run: |
          mkdir -p release-staging/quality-bundle
          # Test binaries
          cp bazel-bin/src/test/cpp/*.tar.gz release-staging/quality-bundle/ 2>/dev/null || true
          cp bazel-bin/src/it/*.tar.gz release-staging/quality-bundle/ 2>/dev/null || true

      - name: Upload quality package
        uses: actions/upload-artifact@v7
        with:
          name: quality-package-${{ needs.context.outputs.short_sha }}
          path: |
            release-staging/quality-bundle/
          retention-days: 30

      # === Legacy combined package (backward compat) ===
      - name: Upload combined packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ needs.context.outputs.short_sha }}
          path: |
            bazel-bin/src/main/cpp/*.tar.gz
            bazel-bin/src/test/cpp/*.tar.gz
            bazel-bin/src/it/*.tar.gz
          retention-days: 30

      - name: Upload build evidence
        uses: actions/upload-artifact@v7
        with:
          name: build-evidence-${{ needs.context.outputs.short_sha }}
          path: evidence/build/
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Stage 3: Unit Tests — JUnit XML + evidence
  # ===========================================================================
  unit_tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [context, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build
          repository-cache: true

      - name: Run unit tests
        shell: bash
        run: |
          bazelisk test \
            --test_output=all \
            --test_arg=--gtest_output=xml \
            //src/test/cpp/...

      - name: Collect test evidence
        if: always()
        shell: bash
        run: |
          mkdir -p evidence/unit-tests
          find bazel-testlogs/src/test/cpp -name "test.xml" -exec sh -c '
            d=$(dirname "$1"); n=$(basename "$d")
            mkdir -p "evidence/unit-tests/$n"
            cp "$1" "evidence/unit-tests/$n/"
            cp "$d/test.log" "evidence/unit-tests/$n/" 2>/dev/null || true
          ' _ {} \;

      - name: Upload unit test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-evidence-${{ needs.context.outputs.short_sha }}
          path: evidence/unit-tests/
          retention-days: 90

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'bazel-testlogs/src/test/cpp/**/test.xml'
          check_name: Unit Test Results
          require_tests: true
        continue-on-error: true

  # ===========================================================================
  # Stage 4: BDD / Integration Tests
  # ===========================================================================
  bdd_tests:
    name: "BDD Tests"
    runs-on: ubuntu-latest
    needs: [context, build]
    if: >-
      needs.context.outputs.pipeline_type != 'branch_push' ||
      needs.context.outputs.is_protected == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build
          repository-cache: true

      - name: Run BDD integration tests
        shell: bash
        run: |
          bazelisk test --test_output=all //src/it/...

      - name: Collect BDD evidence
        if: always()
        shell: bash
        run: |
          mkdir -p evidence/bdd-tests
          find bazel-testlogs/src/it -name "test.xml" -exec sh -c '
            d=$(dirname "$1"); n=$(basename "$d")
            mkdir -p "evidence/bdd-tests/$n"
            cp "$1" "evidence/bdd-tests/$n/"
            cp "$d/test.log" "evidence/bdd-tests/$n/" 2>/dev/null || true
          ' _ {} \;

      - name: Upload BDD test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bdd-test-evidence-${{ needs.context.outputs.short_sha }}
          path: evidence/bdd-tests/
          retention-days: 90

      - name: Publish BDD results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'bazel-testlogs/src/it/**/test.xml'
          check_name: BDD Test Results
          require_tests: true
        continue-on-error: true

  # ===========================================================================
  # Stage 5: Coverage — LCOV with threshold enforcement
  # ===========================================================================
  coverage:
    name: "Coverage"
    runs-on: ubuntu-latest
    needs: [context, build]
    if: >-
      needs.context.outputs.pipeline_type == 'pr_gate' ||
      needs.context.outputs.pipeline_type == 'post_merge' ||
      needs.context.outputs.pipeline_type == 'full'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build
          repository-cache: true

      - name: Generate coverage
        shell: bash
        run: |
          bazelisk coverage --keep_going \
            --combined_report=lcov \
            --instrumentation_filter="//src/main/cpp[/:]" \
            --coverage_report_generator=@bazel_tools//tools/test:coverage_report_generator \
            //src/test/cpp/... || true

      - name: Collect coverage evidence
        shell: bash
        run: |
          mkdir -p evidence/coverage
          find "$(bazelisk info output_path)" -name "_baseline_report.dat" \
            -exec cp {} evidence/coverage/combined-coverage.lcov \; 2>/dev/null || true
          find bazel-testlogs/src/test/cpp -name "coverage.dat" -exec sh -c '
            d=$(dirname "$1"); n=$(basename "$d")
            cp "$1" "evidence/coverage/${n}-coverage.dat"
          ' _ {} \; 2>/dev/null || true

      - name: Check coverage threshold
        if: needs.context.outputs.is_pr == 'true'
        shell: bash
        run: |
          lcov_file="evidence/coverage/combined-coverage.lcov"
          if [[ ! -f "$lcov_file" ]]; then
            echo "::error::Coverage report not found — cannot enforce threshold"
            exit 1
          fi
          # Extract line coverage percentage from LCOV
          total_lines=0
          hit_lines=0
          while IFS= read -r line; do
            if [[ "$line" == LF:* ]]; then
              total_lines=$((total_lines + ${line#LF:}))
            elif [[ "$line" == LH:* ]]; then
              hit_lines=$((hit_lines + ${line#LH:}))
            fi
          done < "$lcov_file"

          if [[ $total_lines -gt 0 ]]; then
            pct=$((hit_lines * 100 / total_lines))
            echo "Line coverage: $pct% ($hit_lines / $total_lines)"
            echo "| Coverage | $pct% ($hit_lines/$total_lines lines) | Threshold: ${COVERAGE_THRESHOLD}% |" >> "$GITHUB_STEP_SUMMARY"
            if [[ $pct -lt ${COVERAGE_THRESHOLD} ]]; then
              echo "::error::Coverage $pct% is below threshold ${COVERAGE_THRESHOLD}%"
              exit 1
            fi
          else
            echo "::error::No instrumented lines found in coverage report"
            exit 1
          fi

      - name: Upload coverage evidence
        uses: actions/upload-artifact@v7
        with:
          name: coverage-evidence-${{ needs.context.outputs.short_sha }}
          path: evidence/coverage/
          retention-days: 90

      - name: Coverage summary in PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: evidence/coverage/combined-coverage.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ==========================================================================
  # Stage 5b: Metrics — machine-readable quality snapshot
  # ==========================================================================
  metrics:
    name: "Metrics"
    runs-on: ubuntu-latest
    needs: [context, build, unit_tests, bdd_tests, coverage]
    if: >-
      needs.context.outputs.pipeline_type == 'pr_gate' ||
      needs.context.outputs.pipeline_type == 'post_merge' ||
      needs.context.outputs.pipeline_type == 'full'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: collected-metrics/

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install metrics analyzers
        shell: bash
        run: |
          python3 -m pip install --quiet lizard

      - name: Analyze code complexity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p metrics

          python3 <<'PY'
          import glob
          import json
          import lizard

          patterns = [
              "src/main/cpp/**/*.c",
              "src/main/cpp/**/*.cc",
              "src/main/cpp/**/*.cpp",
              "src/main/cpp/**/*.cxx",
              "src/main/cpp/**/*.h",
              "src/main/cpp/**/*.hh",
              "src/main/cpp/**/*.hpp",
              "src/main/cpp/**/*.hxx",
              "src/test/cpp/**/*.c",
              "src/test/cpp/**/*.cc",
              "src/test/cpp/**/*.cpp",
              "src/test/cpp/**/*.cxx",
              "src/test/cpp/**/*.h",
              "src/test/cpp/**/*.hh",
              "src/test/cpp/**/*.hpp",
              "src/test/cpp/**/*.hxx",
              "src/it/**/*.cpp",
              "src/it/**/*.hpp",
          ]
          files = sorted({path for pattern in patterns for path in glob.glob(pattern, recursive=True)})

          threshold = 15
          functions = []
          for path in files:
              try:
                  analysis = lizard.analyze_file(path)
              except Exception:
                  continue
              for fn in analysis.function_list:
                  functions.append(
                      {
                          "file": path,
                          "name": fn.name,
                          "long_name": fn.long_name,
                          "start_line": fn.start_line,
                          "nloc": fn.nloc,
                          "token_count": fn.token_count,
                          "parameter_count": fn.parameter_count,
                          "cyclomatic_complexity": fn.cyclomatic_complexity,
                      }
                  )

          functions.sort(key=lambda item: item["cyclomatic_complexity"], reverse=True)
          total_ccn = sum(item["cyclomatic_complexity"] for item in functions)
          max_ccn = functions[0]["cyclomatic_complexity"] if functions else 0
          summary = {
              "report_found": True,
              "threshold": threshold,
              "file_count": len(files),
              "function_count": len(functions),
              "average_cyclomatic_complexity": round(total_ccn / len(functions), 2) if functions else 0,
              "max_cyclomatic_complexity": max_ccn,
              "functions_over_threshold": [item for item in functions if item["cyclomatic_complexity"] > threshold][:25],
              "top_complex_functions": functions[:25],
          }

          with open("metrics/lizard-report.json", "w", encoding="utf-8") as handle:
              json.dump(summary, handle, indent=2)
              handle.write("\n")
          PY

      - name: Analyze duplication (best-effort)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p metrics/jscpd
          npx --yes jscpd \
            --silent \
            --min-lines 5 \
            --min-tokens 50 \
            --reporters json \
            --output metrics/jscpd \
            src/main/cpp src/test/cpp src/it

      - name: Generate metrics contract
        shell: bash
        env:
          SHORT_SHA: ${{ needs.context.outputs.short_sha }}
          BUILD_DATE: ${{ needs.context.outputs.build_date }}
          BRANCH_NAME: ${{ github.ref_name }}
          PIPELINE_TYPE: ${{ needs.context.outputs.pipeline_type }}
          COVERAGE_THRESHOLD: ${{ env.COVERAGE_THRESHOLD }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          mkdir -p metrics

          python3 <<'PY'
          import glob
          import json
          import os
          import xml.etree.ElementTree as ET

          base = "collected-metrics"
          metrics_dir = "metrics"
          os.makedirs(metrics_dir, exist_ok=True)

          def parse_int(value):
              try:
                  return int(value)
              except (TypeError, ValueError):
                  return 0

          def summarize_junit(pattern):
              summary = {
                  "suite_files": 0,
                  "tests": 0,
                  "failures": 0,
                  "errors": 0,
                  "skipped": 0,
              }
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root = ET.parse(path).getroot()
                  except ET.ParseError:
                      continue

                  suites = []
                  if root.tag == "testsuites":
                      suites = [child for child in root if child.tag == "testsuite"]
                  elif root.tag == "testsuite":
                      suites = [root]

                  for suite in suites:
                      summary["suite_files"] += 1
                      summary["tests"] += parse_int(suite.attrib.get("tests"))
                      summary["failures"] += parse_int(suite.attrib.get("failures"))
                      summary["errors"] += parse_int(suite.attrib.get("errors"))
                      summary["skipped"] += parse_int(suite.attrib.get("skipped"))

              return summary

          def summarize_lcov(pattern):
              matches = glob.glob(pattern, recursive=True)
              if not matches:
                  return {
                      "report_found": False,
                      "hit_lines": 0,
                      "total_lines": 0,
                      "line_coverage_percent": None,
                  }

              hit_lines = 0
              total_lines = 0
              with open(matches[0], "r", encoding="utf-8") as handle:
                  for raw_line in handle:
                      line = raw_line.strip()
                      if line.startswith("LF:"):
                          total_lines += parse_int(line[3:])
                      elif line.startswith("LH:"):
                          hit_lines += parse_int(line[3:])

              percent = round((hit_lines * 100.0 / total_lines), 2) if total_lines else None
              return {
                  "report_found": True,
                  "hit_lines": hit_lines,
                  "total_lines": total_lines,
                  "line_coverage_percent": percent,
              }

          def file_inventory(pattern):
              entries = []
              for path in sorted(glob.glob(pattern, recursive=True)):
                  if os.path.isfile(path):
                      entries.append(
                          {
                              "name": os.path.basename(path),
                              "relative_path": path,
                              "size_bytes": os.path.getsize(path),
                          }
                      )
              return entries

          def load_json(path):
              if path and os.path.isfile(path):
                  with open(path, "r", encoding="utf-8") as handle:
                      return json.load(handle)
              return None

          def recursive_find_numeric(payload, candidate_keys):
              if isinstance(payload, dict):
                  for key, value in payload.items():
                      if key in candidate_keys and isinstance(value, (int, float)):
                          return value
                      found = recursive_find_numeric(value, candidate_keys)
                      if found is not None:
                          return found
              elif isinstance(payload, list):
                  for item in payload:
                      found = recursive_find_numeric(item, candidate_keys)
                      if found is not None:
                          return found
              return None

          unit = summarize_junit(os.path.join(base, "unit-test-evidence-*", "**", "test.xml"))
          bdd = summarize_junit(os.path.join(base, "bdd-test-evidence-*", "**", "test.xml"))
          coverage = summarize_lcov(os.path.join(base, "coverage-evidence-*", "**", "combined-coverage.lcov"))

          complexity = load_json("metrics/lizard-report.json") or {
              "report_found": False,
              "threshold": 15,
              "file_count": 0,
              "function_count": 0,
              "average_cyclomatic_complexity": 0,
              "max_cyclomatic_complexity": 0,
              "functions_over_threshold": [],
              "top_complex_functions": [],
          }

          duplication_paths = sorted(glob.glob("metrics/jscpd/**/*.json", recursive=True))
          duplication_report = load_json(duplication_paths[0]) if duplication_paths else None
          duplication = {
              "report_found": duplication_report is not None,
              "report_path": duplication_paths[0] if duplication_paths else None,
              "duplication_percent": recursive_find_numeric(duplication_report, {"percentage", "percent"}),
              "duplicated_lines": recursive_find_numeric(duplication_report, {"duplicatedLines", "lines", "clonesLines"}),
              "clone_count": recursive_find_numeric(duplication_report, {"clones", "duplicates", "cloneCount"}),
          }

          flaky_signal = {
              "history_available": False,
              "candidate_tests": [],
              "note": "Current delivery pipeline captures per-run test evidence only. Rolling flakiness history should be sourced from nightly repeated-test artifacts or an external metrics store.",
          }

          build_profiles = file_inventory(os.path.join(base, "build-evidence-*", "**", "bazel-build-profile.json.gz"))
          source_packages = file_inventory(os.path.join(base, "source-package-*", "**", "*-source.tar.gz"))
          binary_packages = file_inventory(os.path.join(base, "binaries-package-*", "**", "*-binaries.tar.gz"))
          quality_packages = file_inventory(os.path.join(base, "quality-package-*", "**", "*.tar.gz"))

          metrics = {
              "schema_version": "1.0",
              "repository": os.environ["REPOSITORY"],
              "run": {
                  "id": os.environ["RUN_ID"],
                  "number": os.environ["RUN_NUMBER"],
                  "commit": os.environ["SHORT_SHA"],
                  "branch": os.environ["BRANCH_NAME"],
                  "build_date": os.environ["BUILD_DATE"],
                  "pipeline_type": os.environ["PIPELINE_TYPE"],
              },
              "quality": {
                  "unit_tests": unit,
                  "bdd_tests": bdd,
                  "coverage": {
                      **coverage,
                      "threshold_percent": parse_int(os.environ["COVERAGE_THRESHOLD"]),
                  },
                  "complexity": complexity,
                  "duplication": duplication,
                  "flakiness": flaky_signal,
              },
              "build": {
                  "build_profiles": build_profiles,
                  "source_packages": source_packages,
                  "binary_packages": binary_packages,
                  "quality_packages": quality_packages,
                  "total_packaged_bytes": sum(item["size_bytes"] for item in source_packages + binary_packages + quality_packages),
              },
          }

          with open(os.path.join(metrics_dir, "metrics.json"), "w", encoding="utf-8") as handle:
              json.dump(metrics, handle, indent=2)
              handle.write("\n")

          coverage_percent = metrics["quality"]["coverage"]["line_coverage_percent"]
          coverage_display = f"{coverage_percent}%" if coverage_percent is not None else "n/a"
          duplication_percent = metrics["quality"]["duplication"]["duplication_percent"]
          duplication_display = f"{duplication_percent}%" if duplication_percent is not None else "n/a"

          summary = f"""# Metrics Summary

          | Metric | Value |
          |--------|-------|
          | Pipeline | {metrics['run']['pipeline_type']} |
          | Branch | {metrics['run']['branch']} |
          | Commit | {metrics['run']['commit']} |
          | Unit tests | {unit['tests']} total / {unit['failures']} failed / {unit['errors']} errors |
          | BDD tests | {bdd['tests']} total / {bdd['failures']} failed / {bdd['errors']} errors |
          | Line coverage | {coverage_display} |
          | Coverage threshold | {metrics['quality']['coverage']['threshold_percent']}% |
          | Avg complexity | {metrics['quality']['complexity']['average_cyclomatic_complexity']} |
          | Max complexity | {metrics['quality']['complexity']['max_cyclomatic_complexity']} |
          | Functions over threshold | {len(metrics['quality']['complexity']['functions_over_threshold'])} |
          | Duplication | {duplication_display} |
          | Source packages | {len(source_packages)} |
          | Binary packages | {len(binary_packages)} |
          | Quality package files | {len(quality_packages)} |
          | Build profiles | {len(build_profiles)} |
          """

          with open(os.path.join(metrics_dir, "metrics-summary.md"), "w", encoding="utf-8") as handle:
              handle.write(summary)
          PY

          cat metrics/metrics-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: metrics-${{ needs.context.outputs.short_sha }}
          path: metrics/
          retention-days: 90

  # ===========================================================================
  # Stage 6: Sanitizers — ASan + UBSan (required on PR/post-merge)
  # ===========================================================================
  asan_ubsan:
    name: "ASan+UBSan"
    runs-on: ubuntu-latest
    needs: [context, build]
    if: >-
      needs.context.outputs.pipeline_type == 'pr_gate' ||
      needs.context.outputs.pipeline_type == 'post_merge' ||
      needs.context.outputs.pipeline_type == 'full'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-asan
          repository-cache: true

      - name: Run tests with ASan+UBSan
        shell: bash
        continue-on-error: true
        run: |
          bazelisk test \
            --copt=-fsanitize=address,undefined \
            --linkopt=-fsanitize=address,undefined \
            --copt=-fno-omit-frame-pointer \
            --test_env=ASAN_OPTIONS=handle_abort=1:allow_addr2line=true:detect_odr_violation=1 \
            --test_env=UBSAN_OPTIONS=halt_on_error=true:print_stacktrace=1 \
            --test_output=errors \
            //src/test/cpp/...

  # ===========================================================================
  # Stage 7: Security — SAST, SCA, secrets, CodeQL
  # ===========================================================================
  semgrep:
    name: "Semgrep SAST"
    runs-on: ubuntu-latest
    needs: context
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Semgrep
        shell: bash
        run: |
          pip install semgrep
          semgrep scan --config auto --error \
            --exclude "bazel-*" \
            --sarif --output semgrep.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  codeql:
    name: "CodeQL"
    runs-on: ubuntu-latest
    needs: context
    if: >-
      needs.context.outputs.pipeline_type == 'pr_gate' ||
      needs.context.outputs.pipeline_type == 'post_merge' ||
      needs.context.outputs.pipeline_type == 'full'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build
          repository-cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp

      - name: Build for CodeQL
        shell: bash
        run: bazelisk build //src/main/cpp/...

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  trivy:
    name: "Trivy SCA"
    runs-on: ubuntu-latest
    needs: context
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'

  secret_scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    needs: context
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency_review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    needs: context
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  # ===========================================================================
  # Stage 7b: License compliance (PR + post-merge)
  # ===========================================================================
  license_compliance:
    name: "License Compliance"
    runs-on: ubuntu-latest
    needs: context
    if: >-
      needs.context.outputs.pipeline_type == 'pr_gate' ||
      needs.context.outputs.pipeline_type == 'post_merge' ||
      needs.context.outputs.pipeline_type == 'full'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate SBOM for license analysis
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-license-check.json

      - name: Check licenses
        shell: bash
        run: |
          echo "### License Compliance" >> "$GITHUB_STEP_SUMMARY"
          if command -v jq >/dev/null 2>&1; then
            # Extract unique licenses
            licenses=$(jq -r '.packages[]? | .licenseConcluded // "NOASSERTION"' sbom-license-check.json 2>/dev/null | sort -u)
            echo "Detected licenses:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$licenses" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            # Check for copyleft (advisory — not blocking)
            copyleft=$(echo "$licenses" | grep -iE 'GPL|AGPL|LGPL|EUPL|SSPL|CPAL' || true)
            if [[ -n "$copyleft" ]]; then
              echo "::warning::Copyleft licenses detected: $copyleft — review required"
              echo "**Warning**: Copyleft licenses found: $copyleft" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No copyleft licenses detected." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

  # ===========================================================================
  # Stage 8: SBOM — on post-merge (not just nightly)
  # ===========================================================================
  sbom:
    name: "SBOM"
    runs-on: ubuntu-latest
    needs: context
    if: >-
      needs.context.outputs.pipeline_type == 'post_merge' ||
      needs.context.outputs.pipeline_type == 'full'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.context.outputs.short_sha }}
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 365

  # ===========================================================================
  # Stage 9: Evidence Summary — QMS traceability bundle
  # ===========================================================================
  evidence_summary:
    name: "Evidence Summary"
    runs-on: ubuntu-latest
    needs:
      - context
      - quality
      - unit_tests
      - bdd_tests
      - coverage
      - metrics
    if: >-
      always() &&
      (needs.context.outputs.pipeline_type == 'post_merge' || needs.context.outputs.pipeline_type == 'full')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all evidence
        uses: actions/download-artifact@v8
        with:
          path: collected-evidence/

      - name: Generate QMS evidence summary
        shell: bash
        env:
          SHORT_SHA: ${{ needs.context.outputs.short_sha }}
          BUILD_DATE: ${{ needs.context.outputs.build_date }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SUMMARY="collected-evidence/test-evidence-summary.md"

          cat > "$SUMMARY" << SUMEOF
          # Test Evidence Summary

          | Field | Value |
          |-------|-------|
          | **Date** | ${BUILD_DATE} |
          | **Branch** | ${BRANCH} |
          | **Commit** | ${GITHUB_SHA} |
          | **Short SHA** | ${SHORT_SHA} |
          | **Pipeline** | [Run #${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |

          ## Unit Test Results

          | Test Suite | Status |
          |------------|--------|
          SUMEOF

          for xml in collected-evidence/unit-test-evidence-*/*/test.xml; do
            [ -f "$xml" ] || continue
            suite=$(basename "$(dirname "$xml")")
            tests=$(grep -oP 'tests="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
            failures=$(grep -oP 'failures="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
            if [ "$failures" = "0" ]; then
              echo "| $suite | PASSED ($tests tests) |" >> "$SUMMARY"
            else
              echo "| $suite | FAILED ($failures/$tests) |" >> "$SUMMARY"
            fi
          done

          cat >> "$SUMMARY" << 'SUMEOF'

          ## BDD/Integration Test Results

          | Feature Test | Status |
          |--------------|--------|
          SUMEOF

          for xml in collected-evidence/bdd-test-evidence-*/*/test.xml; do
            [ -f "$xml" ] || continue
            suite=$(basename "$(dirname "$xml")")
            tests=$(grep -oP 'tests="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
            failures=$(grep -oP 'failures="\K[0-9]+' "$xml" 2>/dev/null | head -1 || echo "?")
            if [ "$failures" = "0" ]; then
              echo "| $suite | PASSED ($tests tests) |" >> "$SUMMARY"
            else
              echo "| $suite | FAILED ($failures/$tests) |" >> "$SUMMARY"
            fi
          done

          echo "" >> "$SUMMARY"
          echo "---" >> "$SUMMARY"
          echo "_Generated by GitHub Actions — $(date -u '+%Y-%m-%dT%H:%M:%SZ')_" >> "$SUMMARY"

          cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload QMS evidence bundle
        uses: actions/upload-artifact@v7
        with:
          name: qms-evidence-${{ needs.context.outputs.build_date }}-${{ needs.context.outputs.short_sha }}
          path: collected-evidence/
          retention-days: 365

  # ===========================================================================
  # Stage 10: Gate — final status check for branch protection
  # ===========================================================================
  gate:
    name: "Pipeline Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - context
      - build
      - unit_tests
      - bdd_tests
      - asan_ubsan
      - semgrep
      - trivy
      - secret_scan
      - license_compliance
    steps:
      - name: Evaluate gate
        shell: bash
        run: |
          echo "### Pipeline Gate Results" >> "$GITHUB_STEP_SUMMARY"

          failed="false"
          pipeline="${{ needs.context.outputs.pipeline_type }}"

          echo "| Job | Status | Gate |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|------|" >> "$GITHUB_STEP_SUMMARY"

          check_job() {
            local name="$1" result="$2" required="$3"
            echo "| $name | $result | $required |" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$result" != "success" && "$result" != "skipped" && "$required" == "Required" ]]; then
              failed="true"
            fi
          }

          check_job "Build"             "${{ needs.build.result }}"              "Required"
          check_job "Unit Tests"        "${{ needs.unit_tests.result }}"         "Required"
          check_job "Semgrep SAST"      "${{ needs.semgrep.result }}"            "Required"
          check_job "Trivy SCA"         "${{ needs.trivy.result }}"              "Required"
          check_job "Secrets"           "${{ needs.secret_scan.result }}"        "Required"
          check_job "License"           "${{ needs.license_compliance.result }}" "Advisory"

          if [[ "$pipeline" == "pr_gate" || "$pipeline" == "post_merge" || "$pipeline" == "full" ]]; then
            check_job "BDD Tests"       "${{ needs.bdd_tests.result }}"          "Required"
            check_job "ASan+UBSan"      "${{ needs.asan_ubsan.result }}"         "Required"
          else
            check_job "BDD Tests"       "${{ needs.bdd_tests.result }}"          "Advisory"
            check_job "ASan+UBSan"      "${{ needs.asan_ubsan.result }}"         "Advisory"
          fi

          if [[ "$failed" == "true" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Pipeline gate FAILED — required jobs did not pass.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Pipeline gate PASSED.**" >> "$GITHUB_STEP_SUMMARY"
