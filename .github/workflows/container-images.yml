name: Container Images

on:
  push:
    branches:
      - main
      - developpment
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/atlassians

jobs:
  build-base:
    name: Build and push base image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (base)
        id: base_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/base
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/base/Dockerfile
          push: true
          tags: ${{ steps.base_meta.outputs.tags }}
          labels: ${{ steps.base_meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-ci:
    name: Build and push ci image
    runs-on: ubuntu-24.04
    needs: build-base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (ci)
        id: ci_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ci
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ci image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/ci/Dockerfile
          push: true
          build-args: |
            CI_BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/base:sha-${{ github.sha }}
          tags: ${{ steps.ci_meta.outputs.tags }}
          labels: ${{ steps.ci_meta.outputs.labels }}
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

  build-test:
    name: Build and push test image
    runs-on: ubuntu-24.04
    needs: build-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (test)
        id: test_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/test
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/test/Dockerfile
          push: true
          build-args: |
            CI_BUILD_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ci:sha-${{ github.sha }}
          tags: ${{ steps.test_meta.outputs.tags }}
          labels: ${{ steps.test_meta.outputs.labels }}
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

  build-runtime:
    name: Build and push runtime image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (runtime)
        id: runtime_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/runtime
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/runtime/Dockerfile
          push: true
          tags: ${{ steps.runtime_meta.outputs.tags }}
          labels: ${{ steps.runtime_meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime

  build-scanner:
    name: Build and push scanner image
    runs-on: ubuntu-24.04
    needs: build-base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (scanner)
        id: scanner_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/scanner
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push scanner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/scanner/Dockerfile
          push: true
          build-args: |
            CI_BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/base:sha-${{ github.sha }}
          tags: ${{ steps.scanner_meta.outputs.tags }}
          labels: ${{ steps.scanner_meta.outputs.labels }}
          cache-from: type=gha,scope=scanner
          cache-to: type=gha,mode=max,scope=scanner
